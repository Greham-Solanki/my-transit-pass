<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Transit Pass</title>
    <style>
        :root {
            --bg-color: #a53f66;      /* Background from your request */
            --yellow-text: #feff02;   /* Transit text color from your request */
            --button-color: #b19bd9;  /* Expire button color from your request */
            --nav-bg: #FFFFFF;
            --nav-circle-inactive: #F2F9F9;
            --nav-circle-active: #51D0C9;
            --nav-text: #000000;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            overflow: hidden; /* Prevents accidental scrolling */
        }

        /* Container takes up the full mobile screen */
        .app-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .pass-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            color: white;
            text-align: center;
        }

        .ride-count { font-size: 16px; margin-top: 10px; margin-bottom: 5px; opacity: 0.9; }
        .date { font-size: 28px; font-weight: 700; margin-bottom: 15px; }
        .time { font-size: 38px; font-weight: 700; margin-bottom: 15px; letter-spacing: 1px; }
        
        .agency {
            color: var(--yellow-text);
            font-size: 34px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 25px;
        }

        .route { font-size: 18px; margin-bottom: 20px; opacity: 0.9; }

        /* Seamless Video Section */
        .video-section {
            width: 100%;
            height: 200px;
            position: relative;
            overflow: hidden;
            border: none; /* No border as requested */
            background-color: var(--bg-color);
        }

        .bus-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .expire-btn {
            background-color: var(--button-color);
            color: white;
            border: none;
            padding: 14px 0;
            width: 60%;
            max-width: 250px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            margin: 20px 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Bottom Nav */
        .bottom-nav {
            background-color: var(--nav-bg);
            height: 90px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom); /* Fix for iPhone notches */
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--nav-text);
            font-size: 12px;
            font-weight: 500;
            gap: 5px;
        }

        .icon-circle {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background-color: var(--nav-circle-inactive);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .nav-item.active .icon-circle {
            background-color: var(--nav-circle-active);
        }

        .nav-icon {
            width: 28px;
            height: 28px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="pass-content">
            <div class="ride-count">10 Ride Pass</div>
            <div id="live-date" class="date">Fri Feb 20 2026</div>
            <div id="live-clock" class="time">7:40:47 AM</div>
            
            <div class="agency">Peterborough<br>Transit</div>
            <div class="route">Route 2 - Chemong</div>

            <div class="video-section">
                <video class="bus-video" autoplay loop muted playsinline>
                    <source src="Screen Recording 2026-04-05 185122.mp4" type="video/mp4">
                </video>
            </div>

            <button class="expire-btn">Expire</button>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item">
                <div class="icon-circle"><img src="image_644d61.png" class="nav-icon"></div>
                Home
            </div>
            <div class="nav-item">
                <div class="icon-circle"><img src="image_644d86.png" class="nav-icon"></div>
                Parking
            </div>
            <div class="nav-item active">
                <div class="icon-circle"><img src="image_644dbd.png" class="nav-icon" style="filter: brightness(0) invert(1);"></div>
                Transit
            </div>
            <div class="nav-item">
                <div class="icon-circle"><img src="image_644de2.png" class="nav-icon"></div>
                Permits
            </div>
        </nav>
    </div>

    <script>
        function updateClock() {
            const clockElement = document.getElementById('live-clock');
            const dateElement = document.getElementById('live-date');
            const now = new Date();
            
            clockElement.textContent = now.toLocaleTimeString('en-US', { 
                hour12: true, hour: 'numeric', minute: '2-digit', second: '2-digit' 
            });

            dateElement.textContent = now.toLocaleDateString('en-US', {
                weekday: 'short', month: 'short', day: '2-digit', year: 'numeric'
            }).replace(/,/g, '');
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
