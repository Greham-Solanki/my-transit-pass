<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Transit Pass">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ffffff">
    <link rel="manifest" href="manifest.json">
    <title>Transit Pass</title>
    <style>
        :root {
            --card-bg: #a53f66;
            --page-bg: #ffffff;
            --yellow-text: #feff02;
            --button-color: #b19bd9;
            --nav-circle-active: #51D0C9;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--page-bg);
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            height: 100vh;
            height: 100dvh; /* Dynamic viewport height - handles iOS address bar */
            display: flex;
            flex-direction: column;
        }

        .header-controls {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            
            color: #333;
            font-size: 28px;
            background-color: var(--page-bg);
            flex-shrink: 0;
        }

        .pass-card {
            background-color: var(--card-bg);
            width: 92%;
            margin: 8px auto 0;
            border-radius: 24px 24px 0 0;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 24px 15px 20px;
            box-shadow: 0 4px 20px rgba(165, 63, 102, 0.3);
            color: white;
            overflow: hidden;
            min-height: 0; /* Important: allows flex child to shrink */
        }

        .ride-count { font-size: 16px; margin-bottom: 8px; opacity: 0.9; font-weight: 500; }
        .date { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
        .time { font-size: 40px; font-weight: 700; margin-bottom: 16px; letter-spacing: 1px; }

        .agency {
            color: var(--yellow-text);
            font-size: 34px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 14px;
        }

        .route { font-size: 17px; margin-bottom: 16px; opacity: 0.9; }

        .video-wrapper {
            width: 100%;
            flex: 1;
            overflow: hidden;
            margin-bottom: 20px;
            border-radius: 12px;
            min-height: 120px;
            max-height: 200px;
        }

        .bus-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Fallback illustration if video not found */
        .bus-illustration {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #c4708a 0%, #b05070 100%);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            overflow: hidden;
        }

        .expire-btn {
            background-color: var(--button-color);
            color: white;
            border: none;
            padding: 14px 70px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            flex-shrink: 0;
            cursor: pointer;
        }

        .bottom-nav {
            background-color: #ffffff;
            height: 85px;
            flex-shrink: 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom, 20px);
            border-top: 1px solid #f0f0f0;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 12px;
            color: #000;
            gap: 4px;
        }

        .icon-circle {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background-color: #f2f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .active .icon-circle { background-color: var(--nav-circle-active); }
        .active .nav-svg { fill: white; }
        .nav-svg { width: 26px; height: 26px; fill: #444; }
    </style>
</head>

    <script>
        // Register service worker for PWA standalone mode
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }

        function updateClock() {
            const clock = document.getElementById('live-clock');
            const date = document.getElementById('live-date');
            const now = new Date();
            clock.textContent = now.toLocaleTimeString('en-US', { hour12: true, hour: 'numeric', minute: '2-digit', second: '2-digit' });
            date.textContent = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: '2-digit', year: 'numeric' }).replace(/,/g, '');
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
