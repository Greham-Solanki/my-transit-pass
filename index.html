<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Transit Pass">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#a53f66">
    <link rel="manifest" href="manifest.json">
    <title>Transit Pass</title>
    <style>
        :root {
            --card-bg: #a53f66;
            --page-bg: #ffffff;
            --yellow-text: #feff02;
            --button-color: #b19bd9;
            --nav-circle-active: #51D0C9;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--page-bg);
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            height: 100vh;
            height: 100dvh; /* Dynamic viewport height - handles iOS address bar */
            display: flex;
            flex-direction: column;
        }

        .header-controls {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            padding-top: calc(env(safe-area-inset-top, 44px) + 10px);
            color: #333;
            font-size: 28px;
            background-color: var(--page-bg);
            flex-shrink: 0;
        }

        .pass-card {
            background-color: var(--card-bg);
            width: 92%;
            margin: 8px auto;
            border-radius: 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 24px 15px 20px;
            box-shadow: 0 4px 20px rgba(165, 63, 102, 0.3);
            color: white;
            overflow: hidden;
            min-height: 0; /* Important: allows flex child to shrink */
        }

        .ride-count { font-size: 16px; margin-bottom: 8px; opacity: 0.9; font-weight: 500; }
        .date { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
        .time { font-size: 40px; font-weight: 700; margin-bottom: 16px; letter-spacing: 1px; }

        .agency {
            color: var(--yellow-text);
            font-size: 34px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 14px;
        }

        .route { font-size: 17px; margin-bottom: 16px; opacity: 0.9; }

        .video-wrapper {
            width: 100%;
            flex: 1;
            overflow: hidden;
            margin-bottom: 20px;
            border-radius: 12px;
            min-height: 120px;
            max-height: 200px;
        }

        .bus-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Fallback illustration if video not found */
        .bus-illustration {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #c4708a 0%, #b05070 100%);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            overflow: hidden;
        }

        .expire-btn {
            background-color: var(--button-color);
            color: white;
            border: none;
            padding: 14px 70px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            flex-shrink: 0;
            cursor: pointer;
        }

        .bottom-nav {
            background-color: #ffffff;
            height: 85px;
            flex-shrink: 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom, 20px);
            border-top: 1px solid #f0f0f0;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 12px;
            color: #000;
            gap: 4px;
        }

        .icon-circle {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background-color: #f2f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .active .icon-circle { background-color: var(--nav-circle-active); }
        .active .nav-svg { fill: white; }
        .nav-svg { width: 26px; height: 26px; fill: #444; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header-controls">
            <span>&#9776;</span>
            <span>&#8249;</span>
        </div>

        <div class="pass-card">
            <div class="ride-count">10 Ride Pass</div>
            <div id="live-date" class="date">---</div>
            <div id="live-clock" class="time">--:--:-- --</div>

            <div class="agency">Peterborough<br>Transit</div>
            <div class="route">Route 2 - Chemong</div>

            <div class="video-wrapper">
                <video class="bus-video" autoplay loop muted playsinline
                    onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                    <source src="Screen Recording 2026-04-05 185122.mp4" type="video/mp4">
                </video>
                <!-- Fallback SVG illustration shown if video missing -->
                <div class="bus-illustration" style="display:none">
                    <svg viewBox="0 0 360 160" xmlns="http://www.w3.org/2000/svg" width="100%">
                        <!-- Sky -->
                        <rect width="360" height="160" fill="#c4708a"/>
                        <!-- Building 1 -->
                        <rect x="20" y="40" width="100" height="110" fill="#c8856a"/>
                        <rect x="20" y="40" width="100" height="8" fill="#b06a4a"/>
                        <!-- Windows B1 -->
                        <rect x="30" y="55" width="20" height="15" fill="#a8d4e8" rx="2"/>
                        <rect x="60" y="55" width="20" height="15" fill="#a8d4e8" rx="2"/>
                        <rect x="90" y="55" width="20" height="15" fill="#a8d4e8" rx="2"/>
                        <rect x="30" y="80" width="20" height="15" fill="#a8d4e8" rx="2"/>
                        <rect x="60" y="80" width="20" height="15" fill="#a8d4e8" rx="2"/>
                        <rect x="90" y="80" width="20" height="15" fill="#a8d4e8" rx="2"/>
                        <rect x="30" y="105" width="20" height="15" fill="#a8d4e8" rx="2"/>
                        <rect x="60" y="105" width="20" height="15" fill="#a8d4e8" rx="2"/>
                        <rect x="90" y="105" width="20" height="15" fill="#a8d4e8" rx="2"/>
                        <!-- Awning B1 -->
                        <rect x="20" y="130" width="100" height="10" fill="#c04040"/>
                        <!-- Door B1 -->
                        <rect x="55" y="135" width="30" height="25" fill="#8a5a3a"/>
                        <!-- Building 2 (center, taller) -->
                        <rect x="130" y="20" width="100" height="130" fill="#c8856a"/>
                        <rect x="130" y="20" width="100" height="8" fill="#b06a4a"/>
                        <!-- Windows B2 -->
                        <rect x="140" y="35" width="22" height="16" fill="#a8d4e8" rx="2"/>
                        <rect x="170" y="35" width="22" height="16" fill="#a8d4e8" rx="2"/>
                        <rect x="200" y="35" width="22" height="16" fill="#a8d4e8" rx="2"/>
                        <rect x="140" y="60" width="22" height="16" fill="#a8d4e8" rx="2"/>
                        <rect x="170" y="60" width="22" height="16" fill="#a8d4e8" rx="2"/>
                        <rect x="200" y="60" width="22" height="16" fill="#a8d4e8" rx="2"/>
                        <rect x="140" y="85" width="22" height="16" fill="#a8d4e8" rx="2"/>
                        <rect x="170" y="85" width="22" height="16" fill="#a8d4e8" rx="2"/>
                        <rect x="200" y="85" width="22" height="16" fill="#a8d4e8" rx="2"/>
                        <rect x="140" y="110" width="22" height="16" fill="#a8d4e8" rx="2"/>
                        <rect x="170" y="110" width="22" height="16" fill="#a8d4e8" rx="2"/>
                        <rect x="200" y="110" width="22" height="16" fill="#a8d4e8" rx="2"/>
                        <!-- Awning B2 -->
                        <rect x="130" y="130" width="100" height="10" fill="#c04040"/>
                        <!-- Door B2 -->
                        <rect x="165" y="135" width="30" height="25" fill="#8a5a3a"/>
                        <!-- Building 3 -->
                        <rect x="240" y="50" width="100" height="100" fill="#c8856a"/>
                        <rect x="240" y="50" width="100" height="8" fill="#b06a4a"/>
                        <!-- Windows B3 -->
                        <rect x="250" y="65" width="20" height="15" fill="#a8d4e8" rx="2"/>
                        <rect x="280" y="65" width="20" height="15" fill="#a8d4e8" rx="2"/>
                        <rect x="310" y="65" width="20" height="15" fill="#a8d4e8" rx="2"/>
                        <rect x="250" y="90" width="20" height="15" fill="#a8d4e8" rx="2"/>
                        <rect x="280" y="90" width="20" height="15" fill="#a8d4e8" rx="2"/>
                        <rect x="310" y="90" width="20" height="15" fill="#a8d4e8" rx="2"/>
                        <rect x="250" y="115" width="20" height="15" fill="#a8d4e8" rx="2"/>
                        <rect x="280" y="115" width="20" height="15" fill="#a8d4e8" rx="2"/>
                        <rect x="310" y="115" width="20" height="15" fill="#a8d4e8" rx="2"/>
                        <!-- Awning B3 -->
                        <rect x="240" y="130" width="100" height="10" fill="#c04040"/>
                        <!-- Trees -->
                        <rect x="115" y="110" width="8" height="40" fill="#5a8a3a"/>
                        <ellipse cx="119" cy="105" rx="14" ry="18" fill="#4a7a2a"/>
                        <rect x="225" y="110" width="8" height="40" fill="#5a8a3a"/>
                        <ellipse cx="229" cy="105" rx="14" ry="18" fill="#4a7a2a"/>
                        <!-- Sidewalk -->
                        <rect x="0" y="148" width="360" height="12" fill="#999"/>
                        <rect x="0" y="155" width="360" height="5" fill="#888"/>
                    </svg>
                </div>
            </div>

            <button class="expire-btn">Expire</button>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item">
                <div class="icon-circle">
                    <svg class="nav-svg" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                </div>
                Home
            </div>
            <div class="nav-item">
                <div class="icon-circle">
                    <svg class="nav-svg" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                </div>
                Parking
            </div>
            <div class="nav-item active">
                <div class="icon-circle">
                    <svg class="nav-svg" viewBox="0 0 24 24"><path d="M20 12c0-1.1-.9-2-2-2V7c0-1.1-.9-2-2-2H8c-1.1 0-2 .9-2 2v3c-1.1 0-2 .9-2 2v5h2v2c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-2h4v2c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-2h2v-5zM8 7h8v3H8V7zm10 8H6v-3h12v3z"/></svg>
                </div>
                Transit
            </div>
            <div class="nav-item">
                <div class="icon-circle">
                    <svg class="nav-svg" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
                </div>
                Permits
            </div>
        </nav>
    </div>

    <script>
        // Register service worker for PWA standalone mode
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }

        function updateClock() {
            const clock = document.getElementById('live-clock');
            const date = document.getElementById('live-date');
            const now = new Date();
            clock.textContent = now.toLocaleTimeString('en-US', { hour12: true, hour: 'numeric', minute: '2-digit', second: '2-digit' });
            date.textContent = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: '2-digit', year: 'numeric' }).replace(/,/g, '');
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
